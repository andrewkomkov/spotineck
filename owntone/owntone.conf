# Дефолтный конфиг образа spotineck/owntone (универсальный).
# Для конкретного деплоя монтируйте свой /etc/owntone.conf поверх.
general {
    uid = "owntone"
    logfile = "/dev/stdout"   # лог в stdout (docker logs)
    loglevel = "log"
}

library {
    name = "spotineck"
    directories = { "/music" }
    # автозапуск воспроизведения, когда в pipe-источник (Spotify Connect через
    # librespot) пошёл звук
    pipe_autostart = true
}

audio {
    # Локальный звук самого хоста. По умолчанию выключен — включайте при деплое,
    # если у хоста есть колонки (type = "alsa", card/mixer под вашу железку).
    nickname = "local"
    type = "disabled"
}
