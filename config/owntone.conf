# nettop deploy config (mounted at /etc/owntone.conf on top of the default).
general {
    uid = "owntone"
    logfile = "/dev/stdout"
    loglevel = "log"
}

library {
    name = "spotineck"
    directories = { "/music" }
    pipe_autostart = true     # auto-start the pipe from librespot (Spotify Connect)
}

audio {
    # Local nettop speakers — analog output (card 1, CX20632).
    nickname = "nettop"
    type = "alsa"
    card = "plughw:1,0"
    mixer = "Master"
    mixer_device = "hw:1"
}
