// spotineck — AirPlay 1 (classic) приёмник. Звук с iPad/iPhone/Mac пишется в pipe,
// OwnTone подхватывает и разливает на группу колонок.
// Собственный образ ./shairport (Shairport Sync 5.0.4 classic). mDNS публикуется
// через единый avahi ХОСТА по его system D-Bus (mdns_backend = avahi). Свой avahi
// контейнер не поднимает — иначе несколько avahi дерутся за имя хоста.
general = {
  name = "spotineck";              // имя в списке AirPlay на устройствах Apple
  output_backend = "pipe";
  mdns_backend = "avahi";          // явно: общий avahi owntone по system D-Bus
};

// Сырой PCM 44100/16/2 (CD) — ровно то, что ждёт OwnTone от pipe-источника.
pipe = {
  name = "/music/airplay";
};

// Метаданные (трек/артист/обложка) в формате shairport-sync.
// OwnTone читает companion-пайп <pipe>.metadata и показывает их.
metadata = {
  enabled = "yes";
  include_cover_art = "yes";
  pipe_name = "/music/airplay.metadata";
  pipe_timeout = 5000;
};
