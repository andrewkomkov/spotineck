# Default config for the spotineck/owntone image (generic).
# For a specific deployment, mount your own /etc/owntone.conf on top.
general {
    uid = "owntone"
    logfile = "/dev/stdout"   # log to stdout (docker logs)
    loglevel = "log"
}

library {
    name = "spotineck"
    directories = { "/music" }
    # auto-start playback when audio starts flowing into a pipe source
    # (Spotify Connect via librespot)
    pipe_autostart = true
}

audio {
    # The host's own local audio. Disabled by default — enable it on deploy if the
    # host has speakers (type = "alsa", card/mixer for your hardware).
    nickname = "local"
    type = "disabled"
}
