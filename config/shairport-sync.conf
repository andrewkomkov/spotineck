// spotineck — AirPlay 1 (classic) receiver. Audio from iPad/iPhone/Mac is written to
// a pipe, OwnTone picks it up and fans it out to the speaker group.
// Custom image ./shairport (Shairport Sync 5.0.4 classic). mDNS is published through
// the HOST's single avahi over its system D-Bus (mdns_backend = avahi). The container
// does not start its own avahi — otherwise several avahi instances fight over the host name.
general = {
  name = "spotineck";              // name in the AirPlay list on Apple devices
  output_backend = "pipe";
  mdns_backend = "avahi";          // explicit: the shared owntone avahi over system D-Bus
};

// Raw PCM 44100/16/2 (CD) — exactly what OwnTone expects from a pipe source.
pipe = {
  name = "/music/airplay";
};

// Metadata (track/artist/artwork) in the shairport-sync format.
// OwnTone reads the companion pipe <pipe>.metadata and displays it.
metadata = {
  enabled = "yes";
  include_cover_art = "yes";
  pipe_name = "/music/airplay.metadata";
  pipe_timeout = 5000;
};
