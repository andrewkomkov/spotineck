# Деплой-конфиг nettop (монтируется в /etc/owntone.conf поверх дефолтного).
general {
    uid = "owntone"
    logfile = "/dev/stdout"
    loglevel = "log"
}

library {
    name = "spotineck"
    directories = { "/music" }
    pipe_autostart = true     # автозапуск pipe от librespot (Spotify Connect)
}

audio {
    # Локальные динамики nettop — аналоговый выход (card 1, CX20632).
    nickname = "nettop"
    type = "alsa"
    card = "plughw:1,0"
    mixer = "Master"
    mixer_device = "hw:1"
}
